<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DothNews — Infraestrutura Especializada para Portais de Notícias</title>
    <meta name="description" content="Tecnologia própria, suporte especializado e infraestrutura dedicada para operações editoriais que cresceram além das soluções genéricas. 22+ anos, 40+ operações ativas, 99,9% de uptime." />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="DothCom" />
    <link rel="canonical" href="https://dothnews.com.br/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/favicon.png" />
    <meta name="theme-color" content="#0f62fe" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DothNews" />
    <meta property="og:title" content="DothNews — Infraestrutura Especializada para Portais de Notícias" />
    <meta property="og:description" content="Tecnologia própria, suporte especializado e infraestrutura dedicada para operações editoriais que cresceram além das soluções genéricas. 22+ anos, 40+ operações ativas, 99,9% de uptime." />
    <meta property="og:url" content="https://dothnews.com.br/" />
    <meta property="og:image" content="https://dothnews.com.br/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DothNews — Infraestrutura Especializada para Portais de Notícias" />
    <meta name="twitter:description" content="Tecnologia própria, suporte especializado e infraestrutura dedicada para operações editoriais que cresceram além das soluções genéricas. 22+ anos, 40+ operações ativas, 99,9% de uptime." />
    <meta name="twitter:image" content="https://dothnews.com.br/assets/og-image.png" />

    <!-- Performance: preload da imagem LCP (primeiro slide do carousel hero) -->
    <link rel="preload" as="image" href="/assets/sgi-dashboard.png" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DothNews",
      "url": "https://dothnews.com.br",
      "logo": "https://dothnews.com.br/assets/logo-dothnews.svg",
      "description": "Infraestrutura especializada para operações editoriais digitais. Tecnologia própria, suporte especializado e dedicação exclusiva a portais de notícias.",
      "foundingDate": "2002",
      "parentOrganization": {
        "@type": "Organization",
        "name": "DothCom",
        "url": "https://dothnews.com.br"
      },
      "areaServed": "BR",
      "knowsAbout": [
        "infraestrutura editorial",
        "portais de notícias",
        "CMS editorial",
        "performance web",
        "SEO técnico para portais"
      ],
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "description": "Equipe especializada em tecnologia editorial"
      },
      "slogan": "Infraestrutura editorial feita para crescer."
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DothNews",
      "url": "https://dothnews.com.br",
      "description": "Infraestrutura especializada para portais de notícias em crescimento."
    }
    </script>

    <!-- Structured Data: Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Infraestrutura Editorial Digital",
      "name": "DothNews — Plataforma Editorial",
      "description": "Plataforma de infraestrutura dedicada para operações editoriais: CMS próprio, servidores dedicados, suporte especializado, monitoramento 24/7 e uptime de 99,9%.",
      "provider": {
        "@type": "Organization",
        "name": "DothNews"
      },
      "areaServed": "BR",
      "audience": {
        "@type": "Audience",
        "audienceType": "Portais de notícias e operações editoriais digitais"
      },
      "offers": {
        "@type": "Offer",
        "description": "Diagnóstico editorial gratuito. Infraestrutura sob medida para operações em crescimento.",
        "price": "0",
        "priceCurrency": "BRL",
        "name": "Diagnóstico Editorial Gratuito"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Vou perder meu posicionamento no Google durante a migração?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. Preservação de SEO é parte central do nosso processo, não um detalhe tratado depois. Redirecionamentos, estrutura de URLs, sitemap e histórico de indexação são mapeados antes e validados depois. Portais que migram com planejamento não perdem SEO."
          }
        },
        {
          "@type": "Question",
          "name": "O portal vai ficar fora do ar durante a migração?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. A migração acontece em etapas, com o portal operando normalmente durante todo o processo. Cada transição tem janelas controladas e plano de rollback disponível. Para uma operação editorial, downtime não é aceitável. O processo é construído com essa premissa."
          }
        },
        {
          "@type": "Question",
          "name": "Já tentei mudar de plataforma antes. Foi um trauma.",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A maioria das migrações falha por falta de planejamento, não de intenção. O nosso processo começa com diagnóstico estrutural: entendemos a sua operação antes de propor qualquer coisa. Se identificarmos riscos, falamos antes. Preferimos uma relação de longo prazo a uma venda que vai dar problema."
          }
        },
        {
          "@type": "Question",
          "name": "Isso é para operações de qual tamanho?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Atendemos operações editoriais com audiência relevante, desde portais em crescimento acelerado até grupos com múltiplos veículos e alto volume de tráfego. O diagnóstico existe para entender o seu momento e se faz sentido para os dois lados."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o suporte no dia a dia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É uma equipe que conhece a sua operação e o que está em jogo, não um sistema de tickets. O objetivo é que você nunca precise lembrar que tem suporte. As coisas simplesmente funcionam."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
